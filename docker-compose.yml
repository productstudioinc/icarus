version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: icarus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped

  icarus-sandbox:
    image: alpine:latest
    container_name: icarus-sandbox
    command: ["tail", "-f", "/dev/null"]
    volumes:
      - ./data:/workspace
    restart: unless-stopped

volumes:
  redis-data:
